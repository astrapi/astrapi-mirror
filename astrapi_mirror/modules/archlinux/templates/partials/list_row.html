<td class="col-label"><strong>{{ item_data.label or '—' }}</strong></td>

<td class="col-label"><strong>{{ item.label }}</strong></td>
    <td class="col-trunc" title="{{ item.url or '' }}"><code>{{ item.url | truncate(40) }}</code></td>
    <td class="col-slug"><a href="/repo/arch/{{ item_id }}/" target="_blank">{{ item.get('slug', item_id) }}</a></td>
    <td class="col-run">{{ item.last_run or '—' }}</td>
    <td class="col-status"><span class="status-badge status-{{ item.last_status or 'neu' }}">{{ item.last_status or 'neu' }}</span></td>
    <td class="col-actions">
        <div class="action-buttons">
            {# Sync #}
            <button hx-post="/ui/archlinux/{{ item_id }}/sync"
                    hx-target="closest tr"
                    hx-swap="outerHTML"
                    title="Repo synchronisieren"
                    class="btn-icon">
                📦
            </button>
            {# Validate #}
            <a href="javascript:void(0)" 
               onclick="openModal('/ui/archlinux/{{ item_id }}/validate')"
               title="Validieren"
               class="btn-icon">
                ✓
            </a>
            {# Log #}
            <a href="javascript:void(0)"
               onclick="openModal('/ui/archlinux/{{ item_id }}/log')"
               title="Sync-Log anzeigen"
               class="btn-icon">
                📋
            </a>
            {# Sources #}
            <a href="javascript:void(0)"
               onclick="openModal('/ui/archlinux/{{ item_id }}/sources-snippet')"
               title="pacman.conf Snippet"
               class="btn-icon">
                📄
            </a>
            {# Edit #}
            <a href="javascript:void(0)"
               onclick="openEditModal('{{ item_id }}')"
               title="Bearbeiten"
               class="btn-icon">
                ✎
            </a>
            {# Delete #}
            <a href="javascript:void(0)"
               onclick="if(confirm('Wirklich löschen?')) deleteItem('{{ item_id }}')"
               title="Löschen"
               class="btn-icon">
                🗑️
            </a>
        </div>
    </td>
</tr>
