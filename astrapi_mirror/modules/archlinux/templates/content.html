{% extends "layouts/base.html" %}

{% block title %}Arch Linux Repositories{% endblock %}

{% block content %}
<div id="mod-archlinux" class="module-container">
    <div class="page-header">
        <h1>Arch Linux Repositories</h1>
        <p>Verwalte und synchronisiere offizielle und Custom Arch Linux Repositories.</p>
    </div>

    <div class="actions-bar">
        <button hx-post="/api/archlinux/sync-all" 
                hx-target="#mod-archlinux"
                hx-swap="innerHTML"
                class="btn btn-primary">
            📦 Alle Repos syncen
        </button>
    </div>

    <!-- List Wrapper -->
    <div id="list_wrapper_archlinux" 
         hx-get="/ui/archlinux/content" 
         hx-trigger="load"
         hx-swap="innerHTML">
        Laden...
    </div>
</div>
{% endblock %}
