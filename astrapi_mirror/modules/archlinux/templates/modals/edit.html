<!-- Arch Linux Edit Modal -->
<div class="modal-header">
    <h2>{% if item_id %}Repository bearbeiten{% else %}Neues Repository{% endif %}</h2>
</div>
<div class="modal-body">
    <form hx-{% if item_id %}put{% else %}post{% endif %}="/api/archlinux{% if item_id %}/{{ item_id }}{% endif %}"
          hx-target="closest .modal"
          hx-swap="outerHTML swap:1s">
        
        {% if item_id %}
        <input type="hidden" name="id" value="{{ item_id }}">
        {% endif %}

        <div class="form-group">
            <label for="label">Bezeichnung *</label>
            <input type="text" id="label" name="label" required 
                   value="{{ item.label or '' }}" maxlength="120">
        </div>

        <div class="form-group">
            <label for="url">Repository-URL *</label>
            <input type="text" id="url" name="url" required
                   value="{{ item.url or '' }}" maxlength="500"
                   placeholder="https://mirror.archlinux.org/arch/...">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="architectures">Architekturen</label>
                <input type="text" id="architectures" name="architectures"
                       value="{{ item.architectures | join(', ') or 'x86_64' }}"
                       placeholder="x86_64, aarch64">
                <small>Kommagetrennt</small>
            </div>

            <div class="form-group">
                <label for="enabled">
                    <input type="checkbox" id="enabled" name="enabled" 
                           {% if item.enabled %}checked{% endif %}>
                    Aktiviert
                </label>
            </div>
        </div>

        <div class="modal-footer">
            <button type="button" onclick="closeModal()" class="btn btn-secondary">Abbrechen</button>
            <button type="submit" class="btn btn-primary">
                {% if item_id %}Speichern{% else %}Erstellen{% endif %}
            </button>
        </div>
    </form>
</div>
