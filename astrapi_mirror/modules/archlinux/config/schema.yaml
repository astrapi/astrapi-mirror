fields:
  - name:        label
    label:       Bezeichnung
    type:        text
    placeholder: "Arch Core (Official)"
    max:         120
    column:      1
    row:         1
    colspan:     2

  - name:        mirror_urls
    label:       Quellmirrors (eine vollständige URL pro Eintrag)
    type:        list
    placeholder: "https://mirror.archlinux.org/archlinux/extra/os/x86_64"
    column:      1
    row:         2
    colspan:     2
    description: "Erste URL = primärer Mirror; weitere = Fallbacks. Arch direkt in der URL angeben."

  - name:        enabled
    label:       Aktiviert
    type:        boolean
    default:     true
    column:      1
    row:         3
